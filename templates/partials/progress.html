<div class="progress-bar">
  <div class="progress-fill {% if run.status == 'done' %}done{% endif %}"
       id="progress-fill"
       style="width: {% if run.total_tests > 0 %}{{ (run.completed_tests / run.total_tests * 100)|int }}{% else %}0{% endif %}%;">
  </div>
</div>
<p class="text-xs mt-1 opacity-60" id="progress-text">
  {{ run.completed_tests }} / {{ run.total_tests }}
  {% if run.total_tests > 0 %}
  ({{ (run.completed_tests / run.total_tests * 100)|int }}%)
  {% endif %}
</p>
