<!-- Provider edit/new/preset form (HTMX partial) -->
<div class="rounded-lg p-4 mb-2" id="prov-new" style="background: var(--color-card); border: 1px solid var(--color-border);">
  <div class="mb-3">
    <strong class="text-sm">{% if is_preset %}Quick Add: {{ p.name }}{% elif p %}Edit Provider{% else %}New Provider{% endif %}</strong>
  </div>

  <form hx-post="{{ form_action }}"
        hx-target="#provider-list" hx-swap="outerHTML">
    <input type="hidden" name="provider_id" value="{{ p.id if p and not is_preset else '' }}">

    <div class="mb-3">
      <label class="block text-[0.7rem] opacity-60 mb-1 font-medium">Provider Name</label>
      <input type="text" name="name" value="{{ p.name if p else '' }}" placeholder="e.g. OpenCode Zen" required
             class="w-full px-2.5 py-1.5 rounded text-xs outline-none transition-all duration-200"
             style="border: 1px solid var(--color-border); background: var(--color-base); color: var(--color-foreground);">
    </div>

    <div class="mb-3">
      <label class="block text-[0.7rem] opacity-60 mb-1 font-medium">Base URL</label>
      <input type="text" name="base_url" value="{{ p.base_url if p else '' }}" placeholder="https://opencode.ai/zen/v1" required
             class="w-full px-2.5 py-1.5 rounded text-xs outline-none transition-all duration-200"
             style="border: 1px solid var(--color-border); background: var(--color-base); color: var(--color-foreground);">
    </div>

    <div class="mb-3">
      <label class="block text-[0.7rem] opacity-60 mb-1 font-medium">API Key</label>
      <input type="password" name="api_key" value="{{ p.api_key if p and not is_preset else '' }}" placeholder="sk-..." {% if is_preset %}autofocus{% endif %}
             class="w-full px-2.5 py-1.5 rounded text-xs outline-none transition-all duration-200 font-mono"
             style="border: 1px solid var(--color-border); background: var(--color-base); color: var(--color-foreground);">
      {% if is_preset %}<p class="text-[0.6rem] mt-1 opacity-60">Enter your API key for {{ p.name }}. Already set.</p>{% endif %}
    </div>

    <div class="mb-3">
      <label class="block text-[0.7rem] opacity-60 mb-1 font-medium">Provider Type</label>
      <input type="text" name="provider_type" value="{{ p.provider_type if p else 'openai-compatible' }}" placeholder="openai-compatible"
             class="w-full px-2.5 py-1.5 rounded text-xs outline-none transition-all duration-200"
             style="border: 1px solid var(--color-border); background: var(--color-base); color: var(--color-foreground);">
    </div>

    <div class="flex gap-2">
      <button type="submit" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded text-xs font-medium cursor-pointer transition-all duration-200" style="border: 1px solid transparent; color: #fff; background: linear-gradient(135deg, var(--color-midground), color-mix(in srgb, var(--color-midground) 70%, #000));">Save</button>
      <button type="button" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded text-xs font-medium cursor-pointer transition-all duration-200" style="border: 1px solid var(--color-border); color: var(--color-foreground); background: var(--color-card); box-shadow: var(--shadow-bevel);" onclick="location.reload()">Cancel</button>
    </div>
  </form>
</div>
