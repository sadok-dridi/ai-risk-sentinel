<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Risk Sentinel{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/htmx.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">&#9762;</span>
      <span>AI Risk Sentinel</span>
    </div>
    <nav>
      <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>
        <span class="nav-icon">&#9632;</span> Dashboard
      </a>
      <a href="/discover" {% if request.url.path == "/discover" %}class="active"{% endif %}>
        <span class="nav-icon">&#9733;</span> Models
      </a>
      <a href="/attacks" {% if request.url.path == "/attacks" %}class="active"{% endif %}>
        <span class="nav-icon">&#9889;</span> Attacks
      </a>
      <a href="/history" {% if request.url.path == "/history" %}class="active"{% endif %}>
        <span class="nav-icon">&#9776;</span> History
      </a>
      <a href="/settings" {% if request.url.path == "/settings" %}class="active"{% endif %}>
        <span class="nav-icon">&#9881;</span> Settings
      </a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <span class="footer-legal">AI Risk Sentinel · ISO 42001 §8.2 · TeamWill Groupe</span>
    <span class="footer-ver">v3.1</span>
  </footer>
</body>
</html>
